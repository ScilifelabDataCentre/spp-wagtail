# .pre-commit-config.yaml
# Pre-commit hooks to ensure code quality before commits
# Calls .git/hooks/pre-commit automatically on git commit
# If hooks fail during commit, run `pre-commit run --all-files` to fix issues.
# Uses the repo's config files regarding linting/formatting.
---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8   # Fixed version required
    hooks:
      # 1. Format with Ruff
      - id: ruff-format

      # 2. Lint with Ruff + auto-fix if possible
      - id: ruff-check
        args: ["--fix"]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        types: [yaml]
        args: ["-c", ".github/.yamllint.yaml", "--strict"]
